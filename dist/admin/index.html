<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админ-панель</title>
  <script>
    // Запрещаем Decap CMS искать config.yml
    window.CMS_MANUAL_INIT = true;
    window.CMS_URL = null;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "lunarcelestia/school-site", 
        branch: "main",
      },
      media_folder: "public/images",
      public_folder: "/images",
      collections: [
        {
          name: "content",
          label: "Контент сайта",
          files: [
            {
              file: "src/data/content.json",
              label: "Кнопки, карточки и модальные окна",
              name: "site-content",
              fields: [
                {
                  label: "Карточки с кнопками 'Подробнее'",
                  name: "cards",
                  widget: "list",
                  label_singular: "Карточка",
                  fields: [
                    { label: "Заголовок", name: "title", widget: "string" },
                    { label: "Описание", name: "description", widget: "text" },
                    { label: "Текст на кнопке", name: "button_text", widget: "string", default: "Подробнее" },
                    { label: "Ссылка", name: "link", widget: "string", required: false },
                    { label: "Содержимое модального окна", name: "modal_content", widget: "text", required: false },
                    { label: "Число (учеников в классе и т.п.)", name: "count", widget: "number", required: false, value_type: "int" },
                    { label: "Подзаголовок", name: "subtitle", widget: "string", required: false },
                    { label: "Статус этапа", name: "stage", widget: "string", required: false }
                  ]
                },
                {
                  label: "Контакты",
                  name: "contacts",
                  widget: "list",
                  label_singular: "Контакт",
                  fields: [
                    { label: "Тип", name: "type", widget: "string" },
                    { label: "Значение", name: "value", widget: "string" },
                    { label: "Иконка", name: "icon", widget: "string", required: false },
                    { label: "Подпись", name: "sub", widget: "string", required: false }
                  ]
                },
                {
                  label: "Текстовые блоки",
                  name: "text_blocks",
                  widget: "list",
                  label_singular: "Блок",
                  fields: [
                    { label: "Заголовок", name: "heading", widget: "string" },
                    { label: "Содержание", name: "content", widget: "markdown" }
                  ]
                },
                {
                  label: "Проектные практики (6 кнопок)",
                  name: "project_practices",
                  widget: "list",
                  label_singular: "Практика",
                  fields: [
                    { label: "Название кнопки", name: "title", widget: "string" },
                    { label: "Краткое описание (превью)", name: "preview_text", widget: "text", required: false },
                    { label: "Полный текст/информация", name: "full_content", widget: "markdown" },
                    {
                      label: "Тип контента",
                      name: "content_type",
                      widget: "select",
                      options: ["text", "image", "video", "link", "gallery"],
                      default: "text"
                    },
                    {
                      label: "Медиа (картинка/видео/галерея)",
                      name: "media",
                      widget: "list",
                      required: false,
                      fields: [
                        { label: "URL", name: "url", widget: "string" },
                        { label: "Описание", name: "alt", widget: "string", required: false }
                      ]
                    },
                    { label: "Внешняя ссылка (если есть)", name: "external_link", widget: "string", required: false },
                    { label: "Иконка/эмодзи", name: "icon", widget: "string", required: false, default: "📌" }
                  ]
                },
                {
                  label: "Сообщества (классы/кружки)",
                  name: "communities",
                  widget: "list",
                  label_singular: "Сообщество",
                  fields: [
                    { label: "Название", name: "name", widget: "string" },
                    { label: "Описание", name: "description", widget: "text" },
                    { label: "Полная информация", name: "full_info", widget: "markdown", required: false },
                    { label: "Расписание", name: "schedule", widget: "string", required: false },
                    { label: "Ссылка на запись", name: "signup_link", widget: "string", required: false },
                    { label: "Контакты руководителя", name: "contact", widget: "string", required: false }
                  ]
                },
                {
                  label: "Журнал — предприятия",
                  name: "journal_companies",
                  widget: "list",
                  label_singular: "Предприятие",
                  fields: [
                    { label: "Название", name: "name", widget: "string" },
                    { label: "Краткое описание", name: "short_desc", widget: "text" },
                    { label: "Полная статья", name: "full_article", widget: "markdown" },
                    { label: "Ссылка на источник", name: "source_link", widget: "string", required: false }
                  ]
                },
                {
                  label: "Журнал — интервью",
                  name: "journal_interviews",
                  widget: "list",
                  label_singular: "Интервью",
                  fields: [
                    { label: "Заголовок", name: "title", widget: "string" },
                    { label: "Краткий анонс", name: "preview", widget: "text" },
                    { label: "Полный текст интервью", name: "content", widget: "markdown" },
                    { label: "Фото/медиа", name: "media", widget: "image", required: false }
                  ]
                },
                {
                  label: "События — подробности по клику",
                  name: "events",
                  widget: "list",
                  label_singular: "Событие",
                  fields: [
                    { label: "Заголовок", name: "title", widget: "string" },
                    { label: "Полный текст", name: "full_content", widget: "markdown" },
                    {
                      label: "Тип контента",
                      name: "content_type",
                      widget: "select",
                      options: ["text", "image", "video", "link", "gallery"],
                      default: "text"
                    },
                    {
                      label: "Медиа",
                      name: "media",
                      widget: "list",
                      required: false,
                      fields: [
                        { label: "URL", name: "url", widget: "string" },
                        { label: "Описание", name: "alt", widget: "string", required: false }
                      ]
                    },
                    { label: "Внешняя ссылка", name: "external_link", widget: "string", required: false }
                  ]
                },
                {
                  label: "Офис — кнопки тестов",
                  name: "office_features",
                  widget: "list",
                  label_singular: "Тест",
                  fields: [
                    { label: "Название", name: "title", widget: "string" },
                    { label: "Краткое описание", name: "preview_text", widget: "text", required: false },
                    { label: "Полная информация", name: "full_content", widget: "markdown" },
                    {
                      label: "Тип контента",
                      name: "content_type",
                      widget: "select",
                      options: ["text", "image", "video", "link", "gallery"],
                      default: "text"
                    },
                    {
                      label: "Медиа",
                      name: "media",
                      widget: "list",
                      required: false,
                      fields: [
                        { label: "URL", name: "url", widget: "string" },
                        { label: "Описание", name: "alt", widget: "string", required: false }
                      ]
                    },
                    { label: "Внешняя ссылка", name: "external_link", widget: "string", required: false }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    var CMS = window.DecapCMS || window.CMS;
    if (CMS && typeof CMS.init === "function") {
      CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
