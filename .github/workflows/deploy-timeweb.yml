# Автодеплой на Timeweb: push в main → build → загрузка dist/ по FTP.
#
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   TIMEWEB_FTP_HOST, TIMEWEB_FTP_USER, TIMEWEB_FTP_PASSWORD
#
# Переменная репозитория (та же страница → вкладка Variables):
#   TIMEWEB_FTP_REMOTE_DIR — папка на FTP куда заливать (например public_html).
#   Если НЕ создавать переменную — используется ./ (корень после входа по FTP).
#
# FTPS: если Deploy падает на соединении — раскомментируй protocol ниже.

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_FTP_HOST }}
          username: ${{ secrets.TIMEWEB_FTP_USER }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.TIMEWEB_FTP_REMOTE_DIR != '' && vars.TIMEWEB_FTP_REMOTE_DIR || './' }}
          # protocol: ftps-legacy
          # port: 21
          log-level: standard
