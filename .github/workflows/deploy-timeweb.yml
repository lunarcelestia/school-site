# Автодеплой на Timeweb: push в main → build → загрузка dist/ по FTP.
#
# Настройка (GitHub → Settings → Secrets and variables → Actions):
#   TIMEWEB_FTP_HOST           — хост FTP (vh440.timeweb.ru)
#   TIMEWEB_FTP_USER           — логин FTP
#   TIMEWEB_FTP_PASSWORD       — пароль FTP
#   TIMEWEB_FTP_REMOTE_DIR     — (опционально) папка сайта на сервере относительно входа по FTP.
#       Если не задан — используется public_html (типично для Timeweb: в корне FTP есть public_html).
#       Если в FileZilla после входа ты УЖЕ внутри папки с index.html — задай секрет: .
#       Если сайт в domains/ИМЯ/public_html — задай: domains/cq625613.tw1.ru/public_html
#
# Если соединение не проходит: проверь FTP/FTPS в панели Timeweb.
# При необходимости раскомментируй protocol в шаге Deploy.

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Куда грузить на FTP (Timeweb чаще всего public_html)
        id: ftpdir
        env:
          OVERRIDE: ${{ secrets.TIMEWEB_FTP_REMOTE_DIR }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            D="$OVERRIDE"
          else
            D="public_html"
          fi
          echo "dir=$D" >> "$GITHUB_OUTPUT"
          echo "FTP server-dir will be: $D"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_FTP_HOST }}
          username: ${{ secrets.TIMEWEB_FTP_USER }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          # protocol: ftps-legacy
          # port: 21
          log-level: standard
