# Автодеплой на Timeweb: push в main → build → загрузка dist/ по FTP.
#
# Настройка (GitHub → Settings → Secrets and variables → Actions):
#   TIMEWEB_FTP_HOST           — хост FTP (vh440.timeweb.ru)
#   TIMEWEB_FTP_USER           — логин FTP
#   TIMEWEB_FTP_PASSWORD       — пароль FTP
#   TIMEWEB_FTP_REMOTE_DIR     — (опционально) куда относительно входа по FTP заливать dist/.
#       Если НЕ задан — используется "." (текущая папка после входа).
#       В FileZilla посмотри, где лежит рабочий index.html:
#         • если сразу видишь index.html — секрет не нужен (или поставь .)
#         • если сайт в подпапке public_html — задай: public_html
#         • если путь domains/…/public_html — укажи целиком, например domains/cq625613.tw1.ru/public_html
#
# Если соединение не проходит: проверь FTP/FTPS в панели Timeweb.
# При необходимости раскомментируй protocol в шаге Deploy.

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Куда грузить на FTP (см. секрет TIMEWEB_FTP_REMOTE_DIR)
        id: ftpdir
        env:
          OVERRIDE: ${{ secrets.TIMEWEB_FTP_REMOTE_DIR }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            D="$OVERRIDE"
          else
            D="."
          fi
          echo "dir=$D" >> "$GITHUB_OUTPUT"
          echo "FTP server-dir will be: $D"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_FTP_HOST }}
          username: ${{ secrets.TIMEWEB_FTP_USER }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          # Timeweb иногда требует FTPS — если шаг Deploy падает на соединении, раскомментируй:
          # protocol: ftps-legacy
          # port: 21
          log-level: verbose
